name: Deploy Cloudflare Worker

on:
  push:
    paths:
      - 'worker/**'
    branches:
      - main
  workflow_dispatch: # 手動実行も可能

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Worker
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: worker
        run: npm install

      - name: Apply D1 migrations
        working-directory: worker
        run: npx wrangler d1 execute daylog-db --file=schema.sql --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Set Worker secrets
        working-directory: worker
        run: |
          echo "${{ secrets.VAPID_PRIVATE_KEY }}" | npx wrangler secret put VAPID_PRIVATE_KEY
          echo "${{ secrets.VAPID_SUBJECT }}" | npx wrangler secret put VAPID_SUBJECT
          echo "${{ secrets.PRO_KEY_HASH }}" | npx wrangler secret put PRO_KEY_HASH
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy Worker
        working-directory: worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
