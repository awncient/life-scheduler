name = "daylog-notify"
main = "src/index.ts"
compatibility_date = "2025-01-01"

# Cron Trigger: 毎分実行して送信すべき通知をチェック
[triggers]
crons = ["* * * * *"]

# D1データベース
[[d1_databases]]
binding = "DB"
database_name = "daylog-db"
database_id = "ここにD1作成後のIDを貼り付け"

# 公開しても問題ない環境変数はここに設定
# VAPID_PUBLIC_KEY と VAPID_SUBJECT はここに記載OK（秘密情報ではないため）
[vars]
# VAPID_PUBLIC_KEY = "ステップで生成した公開鍵をここに貼り付け"
# VAPID_SUBJECT = "mailto:あなたのメールアドレス"

# 以下はGitHubのSecrets経由で wrangler secret put で設定される（このファイルには書かない）
# - VAPID_PRIVATE_KEY
# - PRO_KEY_HASH
