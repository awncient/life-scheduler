name = "daylog-notify"
main = "src/index.ts"
compatibility_date = "2025-01-01"

# Cron Trigger: 毎分実行して送信すべき通知をチェック
[triggers]
crons = ["* * * * *"]

# D1データベース
[[d1_databases]]
binding = "DB"
database_name = "daylog-db"
database_id = "ここにD1作成後のIDを貼り付け"

# 公開しても問題ない環境変数
[vars]
# VAPID_PUBLIC_KEY = "ステップで生成した公開鍵をここに貼り付け"

# 以下はGitHubのSecrets経由で wrangler secret put で設定（リポジトリには書かない）
# - VAPID_PRIVATE_KEY
# - VAPID_SUBJECT (メールアドレスを含むため)
# - PRO_KEY_HASH
