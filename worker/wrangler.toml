name = "daylog-notify"
main = "src/index.ts"
compatibility_date = "2025-01-01"

# Cron Trigger: 毎分実行して送信すべき通知をチェック
[triggers]
crons = ["* * * * *"]

# D1データベース
[[d1_databases]]
